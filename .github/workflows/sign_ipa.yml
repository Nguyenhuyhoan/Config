
name: Sign IPA Web Trigger

on:
  workflow_dispatch:
    inputs:
      ipa_file:
        description: "Chọn IPA gốc: Esign.ipa hoặc Ksign.ipa"
        required: true
        type: choice
        options:
          - Esign.ipa
          - Ksign.ipa

      cert_folder:
        description: "Tên thư mục chứng chỉ hoặc ALL"
        required: true
        type: string

      p12_password:
        description: "Mật khẩu file P12"
        required: false
        default: "1"
        type: string

permissions:
  contents: write

concurrency:
  group: sign-ipa-config-ipaa
  cancel-in-progress: false

jobs:
  sign:
    runs-on: ubuntu-22.04

    steps:
      # ==========================================
      # 1. CHECKOUT CONFIG
      # ==========================================
      - name: Checkout Config Repository
        uses: actions/checkout@v5
        with:
          repository: Nguyenhuyhoan/Config
          ref: main
          path: config
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      # ==========================================
      # 2. CHECKOUT IPAA
      # ==========================================
      - name: Checkout Ipaa Repository
        uses: actions/checkout@v5
        with:
          repository: Nguyenhuyhoan/Ipaa
          ref: main
          path: ipaa
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      # ==========================================
      # 3. BIÊN DỊCH VÀ CÀI ĐẶT ZSIGN
      # ==========================================
      - name: Install zsign
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            wget \
            unzip \
            zip \
            curl \
            build-essential \
            libssl-dev \
            python3

          echo "Đang tải mã nguồn zsign..."

          wget \
            https://github.com/zhlynn/zsign/archive/refs/heads/master.zip \
            -O zsign.zip

          unzip -q zsign.zip
          cd zsign-master/src

          # Xóa file chỉ dành cho Windows
          rm -f third-party/minizip/iowin32.c

          mkdir -p build-objects

          INCLUDE_FLAGS=()

          while IFS= read -r -d '' INCLUDE_DIR; do
            INCLUDE_FLAGS+=("-I${INCLUDE_DIR}")
          done < <(find . -type d -print0)

          echo "Đang biên dịch zlib và minizip..."

          C_COUNT=0

          while IFS= read -r -d '' C_FILE; do
            C_COUNT=$((C_COUNT + 1))

            OBJECT_NAME="$(
              printf '%s' "$C_FILE" |
              sed 's#^\./##; s#[/.]#_#g'
            ).o"

            echo "Biên dịch C: $C_FILE"

            gcc \
              -c \
              -w \
              -O3 \
              "${INCLUDE_FLAGS[@]}" \
              "$C_FILE" \
              -o "build-objects/$OBJECT_NAME"
          done < <(
            find third-party \
              -type f \
              -name '*.c' \
              ! -name 'iowin32.c' \
              -print0
          )

          if [ "$C_COUNT" -eq 0 ]; then
            echo "Không tìm thấy mã nguồn C của zlib/minizip"
            exit 1
          fi

          CPP_FILES=()

          while IFS= read -r -d '' CPP_FILE; do
            CPP_FILES+=("$CPP_FILE")
          done < <(
            find . \
              -type f \
              -name '*.cpp' \
              -print0
          )

          if [ "${#CPP_FILES[@]}" -eq 0 ]; then
            echo "Không tìm thấy mã nguồn C++ của zsign"
            exit 1
          fi

          echo "Đang biên dịch zsign..."

          g++ \
            -w \
            -O3 \
            "${INCLUDE_FLAGS[@]}" \
            "${CPP_FILES[@]}" \
            build-objects/*.o \
            -lcrypto \
            -pthread \
            -o zsign

          if [ ! -s zsign ]; then
            echo "Không tạo được file thực thi zsign"
            exit 1
          fi

          sudo install -m 0755 zsign /usr/local/bin/zsign

          echo "Đã cài đặt zsign:"
          command -v zsign

      # ==========================================
      # 4. KÝ IPA VÀ CẬP NHẬT a.txt
      # ==========================================
      - name: Sign IPA and Update a.txt
        shell: bash
        env:
          IPA_INPUT: ${{ inputs.ipa_file }}
          CERT_FOLDER: ${{ inputs.cert_folder }}
          P12_PASS: ${{ inputs.p12_password }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          WORKSPACE="$GITHUB_WORKSPACE"
          CONFIG_DIR="$WORKSPACE/config"
          IPAA_DIR="$WORKSPACE/ipaa"
          SIGNED_LIST="$WORKSPACE/signed-files.txt"

          : > "$SIGNED_LIST"

          case "$IPA_INPUT" in
            Esign.ipa)
              NAME_PREFIX="E"
              DESTINATION_DIR="$IPAA_DIR"
              DESTINATION_RELATIVE="."
              RAW_BASE_URL="https://raw.githubusercontent.com/Nguyenhuyhoan/Ipaa/main"
              ;;

            Ksign.ipa)
              NAME_PREFIX="K"
              DESTINATION_DIR="$IPAA_DIR/ksign"
              DESTINATION_RELATIVE="ksign"
              RAW_BASE_URL="https://raw.githubusercontent.com/Nguyenhuyhoan/Ipaa/main/ksign"
              ;;

            *)
              echo "IPA không hợp lệ: $IPA_INPUT"
              echo "Chỉ được chọn Esign.ipa hoặc Ksign.ipa"
              exit 1
              ;;
          esac

          mkdir -p "$DESTINATION_DIR"

          cd "$CONFIG_DIR"

          IPA_FILE="$CONFIG_DIR/$IPA_INPUT"

          echo "========================================"
          echo "IPA được chọn: $IPA_INPUT"
          echo "IPA nguồn: $IPA_FILE"
          echo "Thư mục chứng chỉ: $CERT_FOLDER"
          echo "Tiền tố Name: $NAME_PREFIX"
          echo "Nơi lưu IPA: $DESTINATION_DIR"
          echo "========================================"

          if [ ! -f "$IPA_FILE" ]; then
            echo "Không tìm thấy IPA nguồn trong Config:"
            echo "$IPA_FILE"
            exit 1
          fi

          # a.txt nằm ở thư mục gốc của repository Config
          touch "$CONFIG_DIR/a.txt"

          # Lấy danh sách thư mục chứng chỉ
          if [ "$CERT_FOLDER" = "ALL" ]; then
            DIRS=("$CONFIG_DIR"/chungchi/*/)
          else
            if [[ "$CERT_FOLDER" == *"/"* ]] ||
               [[ "$CERT_FOLDER" == *"\\"* ]] ||
               [ "$CERT_FOLDER" = "." ] ||
               [ "$CERT_FOLDER" = ".." ]; then
              echo "Tên thư mục chứng chỉ không hợp lệ"
              exit 1
            fi

            DIRS=("$CONFIG_DIR/chungchi/$CERT_FOLDER/")
          fi

          if [ "${#DIRS[@]}" -eq 0 ]; then
            echo "Không tìm thấy thư mục chứng chỉ nào"
            exit 1
          fi

          SIGNED_COUNT=0

          for DIR in "${DIRS[@]}"; do
            echo "========================================"
            echo "Đang kiểm tra thư mục: $DIR"

            if [ ! -d "$DIR" ]; then
              echo "Thư mục không tồn tại, bỏ qua: $DIR"
              continue
            fi

            P12_FILES=("$DIR"*.p12)
            PROV_FILES=("$DIR"*.mobileprovision)

            if [ "${#P12_FILES[@]}" -eq 0 ]; then
              echo "Không tìm thấy file .p12 trong: $DIR"
              continue
            fi

            if [ "${#PROV_FILES[@]}" -eq 0 ]; then
              echo "Không tìm thấy file .mobileprovision trong: $DIR"
              continue
            fi

            P12_FILE="${P12_FILES[0]}"

            echo "Sử dụng P12: $P12_FILE"

            for PROV in "${PROV_FILES[@]}"; do
              PROV_BASENAME="$(basename "$PROV" .mobileprovision)"

              # Tên dùng cho file IPA và Bundle ID:
              # - Chuyển thành chữ thường
              # - Khoảng trắng và ký tự đặc biệt thành dấu _
              # - Không dùng dấu -
              NORMALIZED_NAME="$(
                printf '%s' "$PROV_BASENAME" |
                tr '[:upper:]' '[:lower:]' |
                sed -E \
                  -e 's/[^a-z0-9]+/_/g' \
                  -e 's/^_+//' \
                  -e 's/_+$//' \
                  -e 's/_+/_/g'
              )"

              if [ -z "$NORMALIZED_NAME" ]; then
                echo "Tên mobileprovision không hợp lệ: $PROV"
                continue
              fi

              OUT_IPA="${NORMALIZED_NAME}.ipa"
              BUNDLE_ID="com.alone.${NORMALIZED_NAME}"
              OUTPUT_PATH="$DESTINATION_DIR/$OUT_IPA"

              TEMP_IPA="$CONFIG_DIR/.zsign-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${NORMALIZED_NAME}.ipa"

              # Name hiển thị:
              # Vietnam 1.mobileprovision -> KVietnam 1 hoặc EVietnam 1
              DISPLAY_BASE="$(
                PROV_NAME="$PROV_BASENAME" python3 <<'PY'
          import os
          import re

          name = os.environ["PROV_NAME"]

          # Trong Name, dấu _ và - được hiển thị thành khoảng trắng.
          name = re.sub(r"[_-]+", " ", name)
          name = re.sub(r"\s+", " ", name).strip()

          # Viết hoa ký tự đầu, giữ nguyên các ký tự còn lại.
          if name:
              name = name[0].upper() + name[1:]

          print(name)
          PY
              )"

              DISPLAY_NAME="${NAME_PREFIX}${DISPLAY_BASE}"
              LINK="${RAW_BASE_URL}/${OUT_IPA}"

              echo "----------------------------------------"
              echo "IPA nguồn: $IPA_FILE"
              echo "P12: $P12_FILE"
              echo "Provision: $PROV"
              echo "Tên gốc provision: $PROV_BASENAME"
              echo "Name: $DISPLAY_NAME"
              echo "Bundle ID: $BUNDLE_ID"
              echo "IPA đầu ra: $OUTPUT_PATH"
              echo "Link: $LINK"

              rm -f "$TEMP_IPA"

              zsign \
                -k "$P12_FILE" \
                -p "$P12_PASS" \
                -m "$PROV" \
                -b "$BUNDLE_ID" \
                -o "$TEMP_IPA" \
                "$IPA_FILE"

              if [ ! -s "$TEMP_IPA" ]; then
                echo "zsign không tạo được IPA: $OUT_IPA"
                exit 1
              fi

              # Chỉ thay IPA chính thức khi ký thành công
              mv -f "$TEMP_IPA" "$OUTPUT_PATH"

              if [ ! -s "$OUTPUT_PATH" ]; then
                echo "Không thể đưa IPA vào repository Ipaa"
                exit 1
              fi

              # Lưu đường dẫn tương đối để commit repository Ipaa
              if [ "$DESTINATION_RELATIVE" = "." ]; then
                printf '%s\n' "$OUT_IPA" >> "$SIGNED_LIST"
              else
                printf '%s\n' \
                  "$DESTINATION_RELATIVE/$OUT_IPA" \
                  >> "$SIGNED_LIST"
              fi

              # Cập nhật và tự chuyển dữ liệu cũ trong a.txt
              CURRENT_LINK="$LINK" \
              CURRENT_IPA="$OUT_IPA" \
              CURRENT_BUNDLE_ID="$BUNDLE_ID" \
              CURRENT_DISPLAY_NAME="$DISPLAY_NAME" \
              CURRENT_PREFIX="$NAME_PREFIX" \
              python3 <<'PY'
          import os
          import re
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          file_path = Path("a.txt")

          current_link = os.environ["CURRENT_LINK"]
          current_ipa = os.environ["CURRENT_IPA"]
          current_bundle_id = os.environ["CURRENT_BUNDLE_ID"]
          current_display_name = os.environ["CURRENT_DISPLAY_NAME"]
          current_prefix = os.environ["CURRENT_PREFIX"]

          def ipa_from_link(link):
              try:
                  path = unquote(urlparse(link).path)
                  return Path(path).name
              except Exception:
                  return ""

          def normalize_stem(value):
              """
              vietnam-1, vietnam 1 hoặc Vietnam_1
              đều được chuyển thành vietnam_1.
              """
              value = Path(value).stem
              value = value.lower()
              value = re.sub(r"[^a-z0-9]+", "_", value)
              value = re.sub(r"_+", "_", value)
              return value.strip("_")

          def repository_type(link):
              """
              IPA trong /ksign/ dùng tiền tố K.
              IPA ở thư mục gốc Ipaa dùng tiền tố E.
              """
              try:
                  path = unquote(urlparse(link).path)
              except Exception:
                  path = link

              if "/ksign/" in path.lower():
                  return "K"

              return "E"

          def make_link(prefix, ipa_name):
              if prefix == "K":
                  return (
                      "https://raw.githubusercontent.com/"
                      "Nguyenhuyhoan/Ipaa/main/ksign/"
                      f"{ipa_name}"
                  )

              return (
                  "https://raw.githubusercontent.com/"
                  "Nguyenhuyhoan/Ipaa/main/"
                  f"{ipa_name}"
              )

          def make_display_name(old_name, normalized_stem, prefix):
              """
              - Loại bỏ E/K cũ để tránh thành KKVietnam.
              - Đổi _ hoặc - thành khoảng trắng.
              - Viết hoa ký tự đầu.
              - Thêm E hoặc K ở trước.
              """
              name = (old_name or "").strip()

              if name.startswith(prefix) and len(name) > 1:
                  name = name[1:].strip()

              if not name:
                  name = normalized_stem

              name = re.sub(r"[_-]+", " ", name)
              name = re.sub(r"\s+", " ", name).strip()

              if name:
                  name = name[0].upper() + name[1:]

              return prefix + name

          # Key gồm loại E/K và tên IPA để hai thư mục không đè nhau.
          records = {}

          def add_record(link, old_name="", old_bundle_id=""):
              if not link:
                  return

              old_ipa = ipa_from_link(link)

              if not old_ipa and old_name:
                  old_ipa = old_name + ".ipa"

              normalized_stem = normalize_stem(old_ipa)

              if not normalized_stem:
                  return

              prefix = repository_type(link)
              ipa_name = f"{normalized_stem}.ipa"
              bundle_id = f"com.alone.{normalized_stem}"
              display_name = make_display_name(
                  old_name,
                  normalized_stem,
                  prefix
              )

              canonical_link = make_link(prefix, ipa_name)
              key = f"{prefix}/{ipa_name}"

              records[key] = {
                  "link": canonical_link,
                  "name": display_name,
                  "bundle_id": bundle_id,
              }

          if file_path.exists():
              lines = file_path.read_text(
                  encoding="utf-8",
                  errors="ignore"
              ).splitlines()
          else:
              lines = []

          index = 0

          while index < len(lines):
              line = lines[index].strip()

              if not line:
                  index += 1
                  continue

              # Định dạng:
              #
              # Link: ...
              # Name: ...
              # Bundleid: ...
              if line.startswith("Link:"):
                  link = line[len("Link:"):].strip()
                  old_name = ""
                  old_bundle_id = ""

                  if index + 1 < len(lines):
                      next_line = lines[index + 1].strip()

                      if next_line.startswith("Name:"):
                          old_name = next_line[len("Name:"):].strip()
                          index += 1

                  if index + 1 < len(lines):
                      next_line = lines[index + 1].strip()

                      if next_line.startswith("Bundleid:"):
                          old_bundle_id = next_line[
                              len("Bundleid:"):
                          ].strip()
                          index += 1

                  add_record(link, old_name, old_bundle_id)

                  index += 1
                  continue

              # Hỗ trợ định dạng cũ:
              # URL - vietnam-1.ipa - com.alone.vietnam-1
              old_format = re.match(
                  r"^(https?://.+?)\s+-\s+(.+?\.ipa)\s+-\s+(\S+)$",
                  line,
                  flags=re.IGNORECASE
              )

              if old_format:
                  link = old_format.group(1).strip()
                  ipa_name = old_format.group(2).strip()
                  old_bundle_id = old_format.group(3).strip()

                  prefix = repository_type(link)
                  normalized_stem = normalize_stem(ipa_name)

                  if normalized_stem:
                      canonical_ipa = f"{normalized_stem}.ipa"
                      canonical_link = make_link(
                          prefix,
                          canonical_ipa
                      )

                      add_record(
                          canonical_link,
                          normalized_stem.replace("_", " "),
                          old_bundle_id
                      )

              index += 1

          # Thêm mới hoặc cập nhật IPA vừa ký
          current_key = f"{current_prefix}/{current_ipa}"

          records[current_key] = {
              "link": current_link,
              "name": current_display_name,
              "bundle_id": current_bundle_id,
          }

          blocks = []

          for record in records.values():
              blocks.append(
                  f"Link: {record['link']}\n"
                  f"Name: {record['name']}\n"
                  f"Bundleid: {record['bundle_id']}"
              )

          content = "\n\n".join(blocks)

          if content:
              content += "\n"

          file_path.write_text(content, encoding="utf-8")
          PY

              SIGNED_COUNT=$((SIGNED_COUNT + 1))

              echo "Đã ký thành công: $OUTPUT_PATH"
            done
          done

          if [ "$SIGNED_COUNT" -eq 0 ]; then
            echo "Không có IPA nào được ký"
            exit 1
          fi

          # Loại bỏ đường dẫn bị trùng
          sort -u "$SIGNED_LIST" -o "$SIGNED_LIST"

          echo "========================================"
          echo "Tổng số IPA đã ký: $SIGNED_COUNT"

          echo "Danh sách IPA sẽ push lên Ipaa:"
          cat "$SIGNED_LIST"

          echo "========================================"
          echo "Nội dung Config/a.txt:"
          cat "$CONFIG_DIR/a.txt"

      # ==========================================
      # 5. COMMIT VÀ PUSH IPA VÀO IPAA
      # ==========================================
      - name: Commit and Push IPA to Ipaa
        shell: bash
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE/ipaa"

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          SIGNED_LIST="$GITHUB_WORKSPACE/signed-files.txt"

          if [ ! -s "$SIGNED_LIST" ]; then
            echo "Không có danh sách IPA để commit"
            exit 1
          fi

          while IFS= read -r IPA_PATH; do
            if [ -z "$IPA_PATH" ]; then
              continue
            fi

            if [ ! -f "$IPA_PATH" ]; then
              echo "Không tìm thấy IPA đầu ra: $IPA_PATH"
              exit 1
            fi

            git add -- "$IPA_PATH"
          done < "$SIGNED_LIST"

          if git diff --cached --quiet; then
            echo "Repository Ipaa không có thay đổi"
            exit 0
          fi

          git commit -m \
            "Auto signed ${{ inputs.ipa_file }} IPA"

          git pull --rebase origin main
          git push origin HEAD:main

      # ==========================================
      # 6. COMMIT VÀ PUSH a.txt VÀO CONFIG
      # ==========================================
      - name: Commit and Push a.txt to Config
        shell: bash
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE/config"

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- a.txt

          if git diff --cached --quiet; then
            echo "Config/a.txt không có thay đổi"
            exit 0
          fi

          git commit -m \
            "Update a.txt for ${{ inputs.ipa_file }}"

          git pull --rebase origin main
          git push origin HEAD:main
